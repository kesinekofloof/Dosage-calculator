<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIP Dosage Calculator</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:420px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
background:#2c7be5;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>FIP Dosage Calculator</h2>

<label>Cat Weight (kg)</label>
<input type="number" id="weight" step="0.1">

<label>Indication</label>
<select id="indication" onchange="setDose()">
<option value="6">Wet FIP (6 mg/kg)</option>
<option value="8">Dry FIP (8 mg/kg)</option>
<option value="10">Neuro / Ocular (10 mg/kg)</option>
<option value="custom">Custom</option>
</select>

<label>Dose (mg/kg)</label>
<input type="number" id="dose" value="6">

<label>Drug Concentration (mg/ml)</label>
<input type="number" id="conc" value="20">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function setDose(){
let indication = document.getElementById("indication").value;

if(indication !== "custom"){
document.getElementById("dose").value = indication;
}
}

function calc(){

let weight = parseFloat(document.getElementById("weight").value);
let dose = parseFloat(document.getElementById("dose").value);
let conc = parseFloat(document.getElementById("conc").value);

let totalmg = weight * dose;
let ml = totalmg / conc;

document.getElementById("result").innerHTML =
"Total dose: " + totalmg.toFixed(2) + " mg<br>" +
"Injection volume: " + ml.toFixed(2) + " ml";

}

</script>

</body>
</html>
